-2.6499999999999986" data-y="3.6948275862068964" cx="446.7" cy="268.27241379310345" r="3" fill="red"/></g><g><circle data-type="point" data-label="source_trace_21" data-x="-20.75" data-y="3.8100000000000005" cx="193.29999999999995" cy="266.65999999999997" r="3" fill="red"/></g><g><circle data-type="point" data-label="source_trace_0" data-x="-2.6499999999999986" data-y="-18.89" cx="446.7" cy="584.46" r="3" fill="red"/></g><g><circle data-type="point" data-label="source_trace_12" data-x="-2.6499999999999986" data-y="-17.78" cx="446.7" cy="568.9200000000001" r="3" fill="red"/></g><g><circle data-type="point" data-label="source_trace_14" data-x="-2.6499999999999986" data-y="-16.669999999999998" cx="446.7" cy="553.38" r="3" fill="red"/></g><g><circle data-type="point" data-label="source_trace_15" data-x="-2.6499999999999986" data-y="-13.34" cx="446.7" cy="506.76" r="3" fill="red"/></g><g><circle data-type="point" data-label="source_trace_16" data-x="-2.6499999999999986" data-y="-14.45" cx="446.7" cy="522.3" r="3" fill="red"/></g><g><circle data-type="point" data-label="source_trace_17" data-x="-2.6499999999999986" data-y="-15.559999999999999" cx="446.7" cy="537.8399999999999" r="3" fill="red"/></g><g><circle data-type="point" data-label="source_trace_5" data-x="-2.6499999999999986" data-y="-10.009999999999998" cx="446.7" cy="460.14" r="3" fill="red"/></g><g><circle data-type="point" data-label="source_trace_7" data-x="-2.6499999999999986" data-y="-11.12" cx="446.7" cy="475.67999999999995" r="3" fill="red"/></g><g><circle data-type="point" data-label="source_trace_9" data-x="-2.6499999999999986" data-y="-12.23" cx="446.7" cy="491.22" r="3" fill="red"/></g><g><rect data-type="rect" data-label="" data-x="-11.7" data-y="0" x="193.29999999999995" y="40" width="253.40000000000003" height="560" fill="none" stroke="gray" stroke-width="0.07142857142857142"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":14,"c":0,"e":483.79999999999995,"b":0,"d":-14,"f":320};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>